name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Login to Render
        uses: render/ render-login-action@v1

      - name: Deploy to Render
        uses: render/deploy-action@v1
        with:
          service: tetris
          env: production
          branch: main
